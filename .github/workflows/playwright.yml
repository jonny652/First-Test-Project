name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test tests/first-test.spec.ts
    - name: Commit new Linux visual baseline if created
      if: ${{ github.event_name == 'push' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ ! -d tests/snapshots ]; then
          echo "No snapshots directory found."
          exit 0
        fi
        git add tests/snapshots/
        if git diff --cached --quiet; then
          echo "No new baselines to commit."
        else
          git commit -m "chore: add Linux visual regression baseline"
          git push
        fi

    - name: Upload Linux visual snapshots
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: visual-snapshots-linux
        path: tests/snapshots/*linux*.png
        if-no-files-found: warn
        retention-days: 30

    - name: Upload accessibility report
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: accessibility-report
        path: accessibility-reports/
        if-no-files-found: warn
        retention-days: 30

    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: playwright-report
        path: playwright-report/
        if-no-files-found: warn
        retention-days: 30