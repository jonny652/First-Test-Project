name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      all_browsers:
        description: 'Run tests against all browsers? (off = Microsoft Edge only)'
        type: boolean
        default: false
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '24.15.0'
    - name: Install dependencies
      run: npm ci

    # When the toggle is ON, install every browser. Otherwise just Edge.
    - name: Install all Playwright Browsers
      if: ${{ inputs.all_browsers == true }}
      run: npx playwright install --with-deps
    - name: Install Microsoft Edge only
      if: ${{ inputs.all_browsers != true }}
      run: npx playwright install msedge --with-deps

    # When the toggle is ON, run all projects. Otherwise just Microsoft Edge.
    - name: Run Playwright tests (all browsers)
      if: ${{ inputs.all_browsers == true }}
      run: npx playwright test
    - name: Run Playwright tests (Microsoft Edge)
      if: ${{ inputs.all_browsers != true }}
      run: npx playwright test --project="Microsoft Edge"

    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
